<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Ace</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      #renderCanvas {
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-family: 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: bold;
        text-shadow: 0 2px 6px #000a;
        display: flex;
        gap: 40px;
        pointer-events: none;
        user-select: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: #000b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: 'Segoe UI', sans-serif;
        gap: 18px;
      }
      #overlay h1 { font-size: 52px; letter-spacing: 4px; text-shadow: 0 0 30px #4af; }
      #overlay p  { font-size: 18px; opacity: 0.85; max-width: 420px; text-align: center; line-height: 1.6; }
      #overlay button {
        margin-top: 10px;
        padding: 14px 44px;
        font-size: 20px;
        border: none;
        border-radius: 8px;
        background: #4af;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        letter-spacing: 1px;
      }
      #overlay button:hover { background: #7cf; }
      #overlay.hidden { display: none; }

      /* ── Altitude Bar ── */
      #altBar {
        position: fixed;
        right: 10px;
        top: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        pointer-events: none;
        user-select: none;
      }
      #altBarLabel {
        color: #4adeff;
        font-family: 'Segoe UI', sans-serif;
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 2px;
        text-shadow: 0 1px 4px #000;
      }
      #altTrack {
        position: relative;
        width: 16px;
        height: 190px;
        background: rgba(0,8,20,0.55);
        border: 1.5px solid rgba(100,200,255,0.28);
        border-radius: 8px;
      }
      #altFill {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: linear-gradient(to top, rgba(40,180,255,0.8), rgba(40,180,255,0.08));
        border-radius: 0 0 7px 7px;
      }
      #altMarker {
        position: absolute;
        left: 0; right: 0;
        height: 2px;
        background: #fff;
        box-shadow: 0 0 5px #4adeff;
      }
      #altValue {
        color: #fff;
        font-family: monospace;
        font-size: 11px;
        text-shadow: 0 1px 4px #000;
      }

      /* ── Radar 2D ── */
      #radar {
        position: fixed;
        right: 10px;
        bottom: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        pointer-events: none;
        user-select: none;
      }
      #radarLabel {
        color: #4adeff;
        font-family: 'Segoe UI', sans-serif;
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 2px;
        text-shadow: 0 1px 4px #000;
      }
      #radarCanvas {
        background: rgba(0,8,20,0.65);
        border: 1.5px solid rgba(100,200,255,0.28);
        border-radius: 6px;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud">
      <span id="scoreHud">Pássaros: 0</span>
      <span id="timerHud">Tempo: 60s</span>
      <span id="penaltyHud">Colisões: 0</span>
    </div>
    <div id="overlay">
      <h1>✈ SKY ACE</h1>
      <p>
        <b>Setas</b> — mover o avião<br>
        <b>Espaço</b> — atirar nos pássaros<br>
        Evite colidir com os pássaros!<br>
        Você tem <b>60 segundos</b>.
      </p>
      <button id="startBtn">JOGAR</button>
    </div>
    <!-- Altitude Bar -->
    <div id="altBar">
      <div id="altBarLabel">ALT</div>
      <div id="altTrack">
        <div id="altFill"></div>
        <div id="altMarker"></div>
      </div>
      <div id="altValue">0m</div>
    </div>

    <!-- Radar lateral 2D -->
    <div id="radar">
      <div id="radarLabel">RADAR</div>
      <canvas id="radarCanvas" width="120" height="130"></canvas>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
